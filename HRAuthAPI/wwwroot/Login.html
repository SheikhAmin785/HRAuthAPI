<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghna software — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --primary: #1a4fba;
            --primary2: #1641a0;
            --accent: #e8f0ff;
            --text: #1a1d2e;
            --muted: #6b7280;
            --border: #e2e6f0;
            --danger: #dc2626;
            --success: #16a34a;
            --shadow: 0 4px 24px rgba(26,79,186,.10);
            --shadow2: 0 1px 4px rgba(0,0,0,.06);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }


            body::before {
                content: '';
                position: fixed;
                width: 600px;
                height: 600px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(26,79,186,.07) 0%, transparent 70%);
                top: -200px;
                right: -150px;
                pointer-events: none;
            }

            body::after {
                content: '';
                position: fixed;
                width: 400px;
                height: 400px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(26,79,186,.05) 0%, transparent 70%);
                bottom: -100px;
                left: -100px;
                pointer-events: none;
            }


        .card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .card-header {
            background: var(--primary);
            padding: 28px 32px 24px;
            color: white;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .logo-box {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,.15);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -.5px;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 14px;
            font-weight: 600;
            opacity: .95;
        }

        .logo-sub {
            font-size: 11px;
            opacity: .6;
            margin-top: 1px;
            font-weight: 400;
        }

        .card-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -.3px;
        }

        .card-header p {
            font-size: 13px;
            opacity: .7;
            margin-top: 4px;
            font-weight: 400;
        }


        .card-body {
            padding: 28px 32px 32px;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: .03em;
            text-transform: uppercase;
        }

        .input-wrap {
            position: relative;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #fafbfd;
            outline: none;
            transition: border-color .18s, box-shadow .18s, background .18s;
        }

        input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(26,79,186,.1);
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
            transition: color .18s;
            display: flex;
        }

        input:focus ~ .input-icon {
            color: var(--primary);
        }

        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            display: flex;
            border-radius: 4px;
            transition: color .18s;
        }

            .eye-btn:hover {
                color: var(--text);
            }

        /* Submit button */
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background .18s, transform .12s, box-shadow .18s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

            .btn:hover:not(:disabled) {
                background: var(--primary2);
                box-shadow: 0 4px 16px rgba(26,79,186,.3);
                transform: translateY(-1px);
            }

            .btn:active:not(:disabled) {
                transform: translateY(0);
            }

            .btn:disabled {
                opacity: .65;
                cursor: not-allowed;
            }

            .btn .spinner {
                display: none;
                width: 16px;
                height: 16px;
                border: 2px solid rgba(255,255,255,.35);
                border-top-color: white;
                border-radius: 50%;
                animation: spin .65s linear infinite;
            }

            .btn.loading .btn-label {
                display: none;
            }

            .btn.loading .spinner {
                display: block;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }


        .error-box {
            display: none;
            align-items: flex-start;
            gap: 8px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 14px;
            font-size: 13px;
            color: var(--danger);
            animation: shake .3s ease;
        }

            .error-box.show {
                display: flex;
            }

        @keyframes shake {
            0%,100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }


        .card-footer {
            padding: 14px 32px;
            background: #f8f9fc;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-text {
            font-size: 11px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #d1d5db;
            display: inline-block;
            margin-right: 5px;
            transition: background .3s;
        }

            .status-dot.online {
                background: var(--success);
                animation: pulse 2s infinite;
            }

        @keyframes pulse {
            0%,100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }


        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            backdrop-filter: blur(3px);
            z-index: 50;
            place-items: center;
        }

            .overlay.show {
                display: grid;
            }

        .modal {
            background: var(--white);
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            padding: 28px;
            width: 90%;
            max-width: 420px;
            animation: fadeUp .3s ease;
        }

            .modal h2 {
                font-size: 16px;
                font-weight: 600;
                margin-bottom: 6px;
            }

            .modal p {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 18px;
            }

        .user-info-card {
            background: var(--accent);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(26,79,186,.08);
        }

            .user-info-row:last-child {
                border-bottom: none;
            }

            .user-info-row span:first-child {
                color: var(--muted);
                font-size: 11px;
                text-transform: uppercase;
                font-weight: 500;
            }

            .user-info-row span:last-child {
                font-weight: 500;
                color: var(--text);
            }

        .token-box {
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            word-break: break-all;
            margin-bottom: 16px;
            max-height: 60px;
            overflow: hidden;
        }

        .modal-btns {
            display: flex;
            gap: 8px;
        }

        .btn-outline {
            flex: 1;
            padding: 10px;
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: border-color .15s;
        }

            .btn-outline:hover {
                border-color: var(--primary);
                color: var(--primary);
            }

        .btn-primary {
            flex: 2;
            padding: 10px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: background .15s;
        }

            .btn-primary:hover {
                background: var(--primary2);
            }


        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--text);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
            transform: translateY(60px);
            opacity: 0;
            transition: all .3s cubic-bezier(.16,1,.3,1);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }

            .toast.success {
                background: var(--success);
            }

            .toast.error {
                background: var(--danger);
            }
    </style>
</head>
<body>

    <div class="card">

        <!-- Header -->
        <div class="card-header">
            <div class="logo-row">
                <div class="logo-box">MH</div>
                <div>
                    <div class="logo-name">Meghna HR System</div>
                    <div class="logo-sub">Enterprise Resource Portal</div>
                </div>
            </div>
            <h1>Sign in</h1>
            <p>Enter your credentials to continue</p>
        </div>


        <div class="card-body">

            <div class="field">
                <label>User ID</label>
                <div class="input-wrap">
                    <input type="text" id="userId" placeholder="Enter your User ID" autocomplete="username">
                    <span class="input-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </span>
                </div>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <span class="input-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </span>
                    <button class="eye-btn" type="button" onclick="togglePwd()" id="eyeBtn">
                        <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn" id="loginBtn" onclick="doLogin()">
                <span class="btn-label">Sign In</span>
                <div class="spinner"></div>
            </button>

            <div class="error-box" id="errorBox">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="errorText">Invalid User ID or Password.</span>
            </div>

        </div>


        <div class="card-footer">
            <span class="footer-text">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
            </span>
            <span class="footer-text">v1.0.0</span>
        </div>

    </div>


    <div class="overlay" id="overlay">
        <div class="modal">
            <h2> Login Successful</h2>
            <p>Welcome back! Your session has started.</p>

            <div class="user-info-card" id="userInfoCard"></div>

            <div class="token-box" id="tokenPreview"></div>

            <div class="modal-btns">
                <button class="btn-outline" onclick="copyToken()">Copy Token</button>
                <button class="btn-primary" onclick="goToDashboard()">Go to Dashboard →</button>
            </div>
        </div>
    </div>


    <div class="toast" id="toast"></div>

    <script>const API_URL = 'https://localhost:7152/api/Auth/login';


let currentToken = '';
let currentRefreshToken = '';


async function checkApiStatus() {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const res = await fetch(API_URL.replace('/Auth/login', '/Auth/me'),
      { method: 'GET', signal: AbortSignal.timeout(3000) });

    dot.classList.add('online');
    text.textContent = 'API Online';
  } catch {
    dot.classList.remove('online');
    text.textContent = 'API Offline';
  }
}
checkApiStatus();


function togglePwd() {
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type = 'password';
    ico.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}


async function doLogin() {
  const userId   = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errBox   = document.getElementById('errorBox');

  errBox.classList.remove('show');

  if (!userId || !password) {
    showError('Please enter User ID and Password.');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': '*/*' },
      body: JSON.stringify({ userId, password })
    });

    const json = await res.json();

    if (res.ok && json.success && json.data?.success) {
      const d = json.data;
      currentToken        = d.token;
      currentRefreshToken = d.refreshToken;

      // Store in sessionStorage (tab বন্ধ হলে clear হয়)
      sessionStorage.setItem('hr_token',         d.token);
      sessionStorage.setItem('hr_refresh_token', d.refreshToken);
      sessionStorage.setItem('hr_user',          JSON.stringify(d.user));
      sessionStorage.setItem('hr_expires_at',    d.expiresAt);

      showSuccessModal(d.user, d.token, d.expiresAt);
    } else {
      showError(json.data?.message || json.message || 'Invalid User ID or Password.');
    }
  } catch (e) {
    showError('Cannot connect to API. Make sure the server is running.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}


function showSuccessModal(user, token, expiresAt) {
  const expDate = new Date(expiresAt).toLocaleTimeString('en-BD', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('userInfoCard').innerHTML = `
    <div class="user-info-row"><span>Name</span><span>${user.userName}</span></div>
    <div class="user-info-row"><span>User ID</span><span>${user.userId}</span></div>
    <div class="user-info-row"><span>Role</span><span>${user.userType}</span></div>
    <div class="user-info-row"><span>Branch</span><span>${user.branchName}</span></div>
    <div class="user-info-row"><span>Token Expires</span><span>${expDate}</span></div>
  `;

  document.getElementById('tokenPreview').textContent = token.substring(0, 80) + '...';
  document.getElementById('overlay').classList.add('show');
}

function copyToken() {
  navigator.clipboard.writeText(currentToken).then(() => {
    showToast('Token copied!', 'success');
  });
}



        function goToDashboard() {
            document.getElementById('overlay').classList.remove('show');
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 800);
        }

//function goToDashboard() {

//   window.location.href = '/software.aspx';

//  showToast('Redirecting to dashboard...', 'success');

//  // window.location.href = 'software.aspx';
//}

        //    document.getElementById('overlay').classList.remove('show');
        //    showToast('Redirecting to dashboard...', 'success');

        //    // Redirect করার আগে সামান্য delay দাও যাতে toast দেখা যায়
        //    setTimeout(() => {
        //        window.location.href = '/MLIFinance/DashBoard.aspx';
        //    }, 800);
        //}



function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}


document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});


window.addEventListener('load', () => {
  const existing = sessionStorage.getItem('hr_token');
  if (existing) {
    const user = JSON.parse(sessionStorage.getItem('hr_user') || '{}');
    showToast(`Already logged in as ${user.userName || 'User'}`, 'success');
  }
});</script>
</body>
</html>
