<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghna software — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f2f5;
            --white: #ffffff;
            --primary: #1a4fba;
            --text: #1a1d2e;
            --muted: #6b7280;
            --border: #e2e6f0;
            --success: #16a34a;
            --sidebar: #1a1d2e;
        }

        body {
            font-family: 'DM Sans',sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 14px;
        }

        .spin {
            width: 34px;
            height: 34px;
            border: 3px solid #e2e6f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #loading p {
            font-size: 13px;
            color: var(--muted);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 18px 18px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            margin-bottom: 10px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 7px;
            display: grid;
            place-items: center;
            font-family: 'DM Mono',monospace;
            font-size: 11px;
            font-weight: 500;
            color: white;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 13px;
            font-weight: 600;
            color: white;
        }

        .logo-sub {
            font-size: 10px;
            color: rgba(255,255,255,.4);
            margin-top: 1px;
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255,255,255,.3);
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 8px 18px 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,.55);
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
        }

            .nav-item:hover {
                background: rgba(255,255,255,.06);
                color: white;
            }

            .nav-item.active {
                background: rgba(26,79,186,.35);
                color: white;
                border-right: 2px solid var(--primary);
            }

        .sidebar-footer {
            margin-top: auto;
            padding: 14px 18px 0;
            border-top: 1px solid rgba(255,255,255,.08);
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255,255,255,.06);
            border-radius: 8px;
            cursor: pointer;
            transition: background .15s;
        }

            .user-pill:hover {
                background: rgba(255,255,255,.1);
            }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--primary);
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .u-name {
            font-size: 12px;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }

        .u-role {
            font-size: 10px;
            color: rgba(255,255,255,.4);
            margin-top: 1px;
        }

        .logout-ico {
            margin-left: auto;
            color: rgba(255,255,255,.3);
            transition: color .15s;
            flex-shrink: 0;
        }

        .user-pill:hover .logout-ico {
            color: #f87171;
        }

        /* Main */
        .main {
            margin-left: 220px;
            flex: 1;
            padding: 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
        }

        .page-sub {
            font-size: 13px;
            color: var(--muted);
            margin-top: 3px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dcfce7;
            color: #15803d;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #16a34a;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 18px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
            animation: fadeUp .4s ease both;
        }

            .stat-card:nth-child(2) {
                animation-delay: .05s
            }

            .stat-card:nth-child(3) {
                animation-delay: .1s
            }

            .stat-card:nth-child(4) {
                animation-delay: .15s
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .stat-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            margin-bottom: 12px;
        }

        .stat-val {
            font-size: 18px;
            font-weight: 700;
            font-family: 'DM Mono',monospace;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
        }

        /* Cards */
        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,.04);
            overflow: hidden;
            animation: fadeUp .4s .2s ease both;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 500;
            background: #eff6ff;
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #f3f4f6;
            font-size: 13px;
        }

            .info-row:last-child {
                border-bottom: none;
            }

            .info-row .k {
                color: var(--muted);
                font-size: 11px;
                text-transform: uppercase;
                font-weight: 500;
            }

            .info-row .v {
                font-weight: 500;
            }

        .token-area {
            padding: 14px 20px;
            font-family: 'DM Mono',monospace;
            font-size: 10px;
            color: var(--muted);
            word-break: break-all;
            line-height: 1.7;
            background: #f8fafc;
            border-bottom: 1px solid var(--border);
            max-height: 90px;
            overflow: hidden;
        }

        .copy-btn {
            display: block;
            width: 100%;
            padding: 11px;
            background: none;
            border: none;
            font-family: 'DM Sans',sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            cursor: pointer;
            transition: background .15s;
        }

            .copy-btn:hover {
                background: #eff6ff;
            }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--text);
            color: white;
            padding: 11px 16px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
            transform: translateY(60px);
            opacity: 0;
            transition: all .3s cubic-bezier(.16,1,.3,1);
            z-index: 100;
        }

            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }

            .toast.success {
                background: var(--success);
            }

        @media(max-width:768px) {
            .stats {
                grid-template-columns: 1fr 1fr
            }

            .grid2 {
                grid-template-columns: 1fr
            }

            .sidebar {
                display: none
            }

            .main {
                margin-left: 0
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spin"></div>
        <p>Verifying session...</p>
    </div>

    <div class="layout" id="app" style="display:none">

        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-box">MH</div>
                <div>
                    <div class="logo-name">Meghna HR</div>
                    <div class="logo-sub">Enterprise Portal</div>
                </div>
            </div>

            <div class="nav-section-label">Main</div>
            <a class="nav-item active" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /></svg>
                Dashboard
            </a>
            <a class="nav-item" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                Employees
            </a>
            <a class="nav-item" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>
                Branches
            </a>
            <a class="nav-item" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>
                Reports
            </a>

            <div class="nav-section-label" style="margin-top:8px">Account</div>
            <a class="nav-item" href="#">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
                Change Password
            </a>

            <div class="sidebar-footer">
                <div class="user-pill" onclick="doLogout()">
                    <div class="avatar" id="sideAvatar">?</div>
                    <div style="min-width:0">
                        <div class="u-name" id="sideName">...</div>
                        <div class="u-role" id="sideRole">—</div>
                    </div>
                    <div class="logout-ico">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                            <polyline points="16 17 21 12 16 7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <div>
                    <div class="page-title" id="welcomeTitle">Welcome!</div>
                    <div class="page-sub" id="welcomeSub">Loading...</div>
                </div>
                <div class="badge"><span class="dot"></span> Session Active</div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#eff6ff">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a4fba" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                    </div>
                    <div class="stat-val" id="sUserId">—</div>
                    <div class="stat-label">User ID</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#f0fdf4">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>
                    </div>
                    <div class="stat-val" id="sBranch">—</div>
                    <div class="stat-label">Branch Code</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fefce8">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ca8a04" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
                    </div>
                    <div class="stat-val" id="sRole">—</div>
                    <div class="stat-label">User Type</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#fdf4ff">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>
                    </div>
                    <div class="stat-val" id="sExpiry">—</div>
                    <div class="stat-label">Expires At</div>
                </div>
            </div>

            <div class="grid2">
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">User Information</span>
                        <span class="card-tag">JWT Claims</span>
                    </div>
                    <div id="userInfoList"></div>
                </div>
                <div class="card">
                    <div class="card-head">
                        <span class="card-title">Access Token</span>
                        <span class="card-tag">Bearer JWT</span>
                    </div>
                    <div class="token-area" id="tokenDisplay"></div>
                    <button class="copy-btn" onclick="copyToken()">📋 Copy Full Token</button>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>const API_BASE = 'https://localhost:7152/api';

window.addEventListener('load', async () => {
  const token      = sessionStorage.getItem('hr_token');
  const userJson   = sessionStorage.getItem('hr_user');
  const expiresAt  = sessionStorage.getItem('hr_expires_at');

  if (!token) { window.location.href = '/login.html'; return; }

  if (expiresAt && new Date(expiresAt) < new Date()) {
    sessionStorage.clear();
    window.location.href = '/login.html';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/Auth/me`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) {
      sessionStorage.clear();
      window.location.href = '/login.html';
      return;
    }
    const json = await res.json();
    loadUI(json.data || JSON.parse(userJson || '{}'), token, expiresAt);
  } catch {
    const user = JSON.parse(userJson || '{}');
    if (user.userId) loadUI(user, token, expiresAt);
    else { window.location.href = '/login.html'; }
  }
});

function loadUI(user, token, expiresAt) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  document.getElementById('welcomeTitle').textContent = `Welcome, ${user.userName || user.userId}!`;
  document.getElementById('welcomeSub').textContent   = `${user.branchName} — ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`;

  const ini = (user.userName||'U')[0].toUpperCase();
  document.getElementById('sideAvatar').textContent = ini;
  document.getElementById('sideName').textContent   = user.userName || user.userId;
  document.getElementById('sideRole').textContent   = user.userType;

  document.getElementById('sUserId').textContent = user.userId || '—';
  document.getElementById('sBranch').textContent = user.branchCode || '—';
  document.getElementById('sRole').textContent   = user.userType || '—';

  if (expiresAt) {
    document.getElementById('sExpiry').textContent =
      new Date(expiresAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  }

  const fields = [
    ['User ID',     user.userId],
    ['Full Name',   user.userName],
    ['User Type',   user.userType],
    ['Employee ID', user.employeeId || '—'],
    ['Branch Code', user.branchCode],
    ['Branch Name', user.branchName],
  ];
  document.getElementById('userInfoList').innerHTML = fields.map(([k,v]) =>
    `<div class="info-row"><span class="k">${k}</span><span class="v">${v||'—'}</span></div>`
  ).join('');

  document.getElementById('tokenDisplay').textContent = token;
}

async function doLogout() {
  try {
    await fetch(`${API_BASE}/Auth/logout`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${sessionStorage.getItem('hr_token')}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ refreshToken: sessionStorage.getItem('hr_refresh_token') || '' })
    });
  } catch {}
  sessionStorage.clear();
  window.location.href = '/login.html';
}

function copyToken() {
  navigator.clipboard.writeText(sessionStorage.getItem('hr_token') || '').then(() => {
    showToast('Token copied!', 'success');
  });
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}</script>
</body>
</html>
